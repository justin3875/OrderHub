<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icon.png" />
  <link rel="shortcut icon" href="./icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂餐頁面</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* ====== 全局重置 ====== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333;
    }

    /* ====== 容器與卡片 ====== */
    .wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 20px;
    }
    .card {
      position: relative; /* 讓絕對定位的返回按鈕相對於 card */
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      max-width: 360px;
      width: 100%;
      padding: 30px 20px;
    }
    .card header {
      text-align: center;
      margin-bottom: 24px;
      position: relative;
    }
    .card header h1 {
      font-size: 26px;
      margin-bottom: 8px;
      color: #2c3e50;
    }
    .card header p {
      font-size: 14px;
      color: #7f8c8d;
    }

    /* ====== 返回按鈕 ====== */
    .back-btn {
      position: absolute;
      top: 10px;  /* 根據 card 的 padding 調整 */
      left: 10px; /* 根據 card 的 padding 調整 */
      padding: 6px 10px;
      font-size: 14px;
      background: linear-gradient(90deg, #3498db, #2980b9);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .back-btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.12);
    }
    .back-btn:hover {
      background: linear-gradient(90deg, #2980b9, #3498db);
    }

    /* ====== 按鈕樣式 ====== */
    .action-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 0;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      color: #fff;
      width: 100%;
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.12);
    }
    .btn:disabled {
      background: #bdc3c7 !important;
      cursor: not-allowed;
      opacity: 0.7;
      color: #fff;
    }
    .btn-primary {
      background: linear-gradient(90deg, #1abc9c, #16a085);
    }
    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(90deg, #16a085, #1abc9c);
    }
    .btn-secondary {
      background: linear-gradient(90deg, #3498db, #2980b9);
    }
    .btn-secondary:hover:not(:disabled) {
      background: linear-gradient(90deg, #2980b9, #3498db);
    }
    .btn-danger {
      background: linear-gradient(90deg, #e74c3c, #c0392b);
    }
    .btn-danger:hover:not(:disabled) {
      background: linear-gradient(90deg, #c0392b, #e74c3c);
    }

    /* ====== 訂單區塊 ====== */
    .order-block {
      width: 100%;
      margin-bottom: 16px;
    }
    .order-block select,
    .order-block input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .note-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .note-row select {
      width: 120px;
    }
    .note-row input {
      flex: 1;
    }
    .delete-btn {
      padding: 6px 10px;
      font-size: 12px;
      background: linear-gradient(90deg, #e74c3c, #c0392b);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .delete-btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.12);
    }
    .delete-btn:hover {
      background: linear-gradient(90deg, #c0392b, #e74c3c);
    }
    .delete-btn:disabled {
      background: #bdc3c7 !important;
      cursor: not-allowed;
      opacity: 0.7;
    }

    /* ====== 圖片預覽 ====== */
    #restaurantImageContainer {
      text-align: center;
      margin-top: 20px;
    }
    #restaurantImageContainer img {
      max-width: 100%;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <!-- 返回按鈕：放在 card 內左上方 -->
      <button class="back-btn" onclick="window.location.href='index.html'">← 返回</button>
      <br/>
      <!-- 標題區 -->
      <header>
        <h1>🍽️ 我要訂餐</h1>
        <p id="restaurantName">載入中…</p>
      </header>

      <!-- 訂單輸入區 -->
      <div id="orderContainer"></div>

      <!-- 新增與送出按鈕 -->
      <div class="action-list">
        <button id="addBtn" class="btn btn-primary" onclick="addOrderInput()" disabled>
          ＋ 增加一份餐點
        </button>
        <button id="submitBtn" class="btn btn-primary" onclick="submitOrder()" disabled>
          送出訂單
        </button>
      </div>

      <!-- 餐廳圖片預覽 -->
      <div id="restaurantImageContainer"></div>
    </div>
  </div>
<script>
const firebaseConfig = {
apiKey:"\\FIREBASE\\",
authDomain:"\\FIREBASE\\",
projectId:"\\FIREBASE\\",
storageBucket:"\\FIREBASE\\",
messagingSenderId:"\\FIREBASE\\",
appId:"\\FIREBASE\\"
}

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig)
}
const db=firebase.firestore()

let currentSessionId=""
let menuItems=[]
let groupedMembers={}
let memberGroupMap={}
let sessionUnsubscribe=null


async function loadMembers(){

const snapshot=await db.collection("members").get()

groupedMembers={}
memberGroupMap={}

snapshot.forEach(doc=>{

if(doc.id==="groups")return

const data=doc.data()
const group=data.group||"其他"

if(!groupedMembers[group])groupedMembers[group]=[]

groupedMembers[group].push({
code:data.code,
name:data.name,
group:group
})

memberGroupMap[data.code]=group

})

}



function listenSessionClosed(sessionId){

if(sessionUnsubscribe)sessionUnsubscribe()

sessionUnsubscribe=db.collection("sessions")
.doc(sessionId)
.onSnapshot(doc=>{

const data=doc.data()

if(data && data.closed){

Swal.fire({
icon:'warning',
title:'已經關團',
text:'訂餐已關團，若要加點請聯絡開團者',
allowOutsideClick:false
}).then(()=>{
window.location.href='index.html'
})

}

})

}



async function loadTodaySession(){

await loadMembers()

const snapshot=await db.collection("sessions")
.orderBy("timeCreated","desc")
.limit(1)
.get()

const title=document.getElementById("restaurantName")

if(!snapshot.empty){

const doc=snapshot.docs[0]

currentSessionId=doc.id

listenSessionClosed(currentSessionId)

const restaurant=doc.data().restaurantName||"（未命名餐廳）"

title.innerText=`🍽️ 今日餐廳：${restaurant}`

const imageUrl=doc.data().imageUrl

if(imageUrl){

const imgContainer=document.getElementById("restaurantImageContainer")

imgContainer.innerHTML=`<img src="${imageUrl}" alt="今日餐廳圖片"/>`

}

const menuDoc=await db.collection("menus").doc(currentSessionId).get()

if(menuDoc.exists){

menuItems=menuDoc.data().menu||[]

addOrderInput()

document.getElementById("addBtn").disabled=false
document.getElementById("submitBtn").disabled=false

}

}else{

title.innerText="⚠️ 今天尚未開團"

}

}



function buildMemberSelect(){

const select=document.createElement("select")

select.innerHTML=`<option disabled selected value="">代號</option>`

Object.keys(groupedMembers)
.sort((a,b)=>a.localeCompare(b,'zh-Hant-u-co-stroke'))
.forEach(group=>{

const optGroup=document.createElement("optgroup")

optGroup.label=`----${group}----`

groupedMembers[group].forEach(member=>{

const opt=document.createElement("option")

opt.value=member.code
opt.textContent=`${member.code} ${member.name}`

optGroup.appendChild(opt)

})

select.appendChild(optGroup)

})

return select

}



function addOrderInput(){

const container=document.getElementById("orderContainer")

const block=document.createElement("div")
block.className="order-block"

const menuSelect=document.createElement("select")
menuSelect.className="menu-select"

menuSelect.innerHTML='<option value="">請選擇餐點</option>'

menuItems.forEach(item=>{
const option=document.createElement("option")
option.value=item
option.textContent=item
menuSelect.appendChild(option)
})

const noteRow=document.createElement("div")
noteRow.className="note-row"

const codeSelect=buildMemberSelect()

const noteInput=document.createElement("input")
noteInput.type="text"
noteInput.placeholder="備註（可留空）"

const delBtn=document.createElement("button")
delBtn.className="delete-btn"
delBtn.textContent="刪除"

delBtn.onclick=()=>{
block.remove()
updateDeleteButtons()
}

const allBlocks=document.querySelectorAll(".order-block")

if(allBlocks.length>0){

const firstCode=allBlocks[0].querySelector(".note-row select").value

if(firstCode)codeSelect.value=firstCode

}

noteRow.appendChild(codeSelect)
noteRow.appendChild(noteInput)
noteRow.appendChild(delBtn)

block.appendChild(menuSelect)
block.appendChild(noteRow)

container.appendChild(block)

updateDeleteButtons()

}



function updateDeleteButtons(){

const blocks=document.querySelectorAll(".order-block")

document.querySelectorAll(".delete-btn").forEach(btn=>{

btn.style.display=(blocks.length>1)?"inline-block":"none"

})

}



async function submitOrder(){

const submitBtn=document.getElementById("submitBtn")
const addBtn=document.getElementById("addBtn")

const blocks=document.querySelectorAll(".order-block")

submitBtn.disabled=true
addBtn.disabled=true

submitBtn.textContent="送出中…"

document.querySelectorAll(".delete-btn").forEach(btn=>btn.disabled=true)

try{

const sessionDoc=await db.collection("sessions").doc(currentSessionId).get()
const sessionData=sessionDoc.data()

if(sessionData && sessionData.closed){

Swal.fire({
icon:'warning',
title:'已經關團',
text:'本次訂餐已經關團，請回首頁',
allowOutsideClick:false
}).then(()=>{
window.location.href='index.html'
})

return
}

const batch=db.batch()

for(const block of blocks){

const item=block.querySelector(".menu-select").value
const code=block.querySelector(".note-row select").value
const note=block.querySelector(".note-row input").value.trim()

const group=memberGroupMap[code]||""

if(!item){
alert("請選擇餐點！")
throw new Error("餐點未填寫")
}

if(!code){
alert("請選擇代號！")
throw new Error("代號未填寫")
}

const ref=db.collection("orders")
.doc(currentSessionId)
.collection("items")
.doc()

batch.set(ref,{
item,
code,
group,
note,
time:firebase.firestore.FieldValue.serverTimestamp()
})

}

await batch.commit()

Swal.fire({
icon:'success',
title:'訂餐成功！',
text:'要前往統計頁確認嗎？',
showCancelButton:true,
confirmButtonText:'📊 前往統計',
cancelButtonText:'🍱 繼續點餐'
}).then((result)=>{

if(result.isConfirmed){
window.location.href='summary.html'
}else{
location.reload()
}

})

}catch(e){

console.error("❌ 送出失敗：",e.message)

submitBtn.disabled=false
addBtn.disabled=false

submitBtn.textContent="送出訂單"

document.querySelectorAll(".delete-btn").forEach(btn=>btn.disabled=false)

}

}

window.onload=loadTodaySession
</script>
</body>
</html>
