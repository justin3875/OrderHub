<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>訂餐頁面</title>
  <link rel="icon" type="image/png" sizes="16x16" href="./icon.png" />
  
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* ====== 全局重置 ====== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: "Helvetica Neue", Arial, sans-serif;   background: linear-gradient(135deg, #f5f7fa, #c3cfe2);   color: #333; }
    /* ====== 容器與卡片 ====== */
    .wrapper { display: flex;   align-items: center;   justify-content: center;   min-height: 100%;   padding: 20px; }
    .card { position: relative;   background-color: #ffffff;   border-radius: 12px;   box-shadow: 0 8px 16px rgba(0,0,0,0.1);   max-width: 360px;   width: 100%;   padding: 30px 20px; }
    .card header { text-align: center;   margin-bottom: 24px;   position: relative; }
    .card header h1 { font-size: 26px;   margin-bottom: 8px;   color: #2c3e50; }
    .card header p { font-size: 14px;   color: #7f8c8d; }
    /* ====== 返回按鈕 ====== */
    .back-btn { position: absolute;   top: 10px;     left: 10px;    padding: 6px 10px;   font-size: 14px;   background: linear-gradient(90deg, #3498db, #2980b9);
      color: #fff;   border: none;   border-radius: 6px;   cursor: pointer;   transition: transform 0.1s, box-shadow 0.2s; }
    .back-btn:active { transform: translateY(2px);   box-shadow: 0 4px 8px rgba(0,0,0,0.12); }
    .back-btn:hover { background: linear-gradient(90deg, #2980b9, #3498db); }
    /* ====== 按鈕樣式 ====== */
    .action-list { display: flex;   flex-direction: column;   gap: 16px;   margin-top: 16px; }
    .btn { display: flex;   align-items: center;   justify-content: center;   padding: 14px 0;   font-size: 18px;   border: none;   border-radius: 8px;   cursor: pointer;   transition: transform 0.1s, box-shadow 0.2s;   color: #fff;   width: 100%; }
    .btn:active { transform: translateY(2px);   box-shadow: 0 4px 8px rgba(0,0,0,0.12); }
    .btn:disabled { background: #bdc3c7 !important;   cursor: not-allowed;   opacity: 0.7;   color: #fff; }
    .btn-primary { background: linear-gradient(90deg, #1abc9c, #16a085); }
    .btn-primary:hover:not(:disabled) { background: linear-gradient(90deg, #16a085, #1abc9c); }
    .btn-secondary { background: linear-gradient(90deg, #3498db, #2980b9); }
    .btn-secondary:hover:not(:disabled) { background: linear-gradient(90deg, #2980b9, #3498db); }
    .btn-danger { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    .btn-danger:hover:not(:disabled) { background: linear-gradient(90deg, #c0392b, #e74c3c); }
    /* ====== 訂單區塊 ====== */
    .order-block { width: 100%;   margin-bottom: 16px; }
    .order-block select,.order-block input { width: 100%;   padding: 10px;   font-size: 16px;   margin-bottom: 8px;   border: 1px solid #ccc;   border-radius: 6px; }
    .note-row { display: flex;   gap: 8px;   align-items: center; }
    .note-row select { width: 120px; }
    .note-row input { flex: 1; }
    .delete-btn { padding: 6px 10px;   font-size: 12px;   background: linear-gradient(90deg, #e74c3c, #c0392b);   color: white;   border: none;   border-radius: 6px;   cursor: pointer;   transition: transform 0.1s, box-shadow 0.2s; }
    .delete-btn:active { transform: translateY(2px);   box-shadow: 0 4px 8px rgba(0,0,0,0.12); }
    .delete-btn:hover { background: linear-gradient(90deg, #c0392b, #e74c3c); }
    .delete-btn:disabled { background: #bdc3c7 !important;   cursor: not-allowed;   opacity: 0.7; }
    /* ====== 圖片預覽 ====== */
    #restaurantImageContainer { text-align: center;   margin-top: 20px; }
    #restaurantImageContainer img { max-width: 100%;   border-radius: 10px;   box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="card">
      <button class="back-btn" onclick="window.location.href='index.html'">← 返回首頁</button>
      
      <header>
        <h1>🍽️ 我要訂餐</h1>
        <p id="restaurantName">正在載入菜單...</p>
      </header>

      <div id="orderContainer"></div>

      <div class="action-list">
        <button id="addBtn" class="btn btn-primary" onclick="addOrderInput()" disabled>＋ 增加一份餐點</button>
        <button id="submitBtn" class="btn btn-primary" onclick="submitOrder()" disabled>送出訂單</button>
      </div>

      <div id="restaurantImageContainer"></div>
    </div>
  </div>

<script>
/** --- Firebase 配置 --- **/
const firebaseConfig = {
apiKey:"\\Firebase\\",
authDomain:"\\Firebase\\",
projectId:"\\Firebase\\",
storageBucket:"\\Firebase\\",
messagingSenderId:"\\Firebase\\",
appId:"\\Firebase\\"
}

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();

/** --- 全域變數 --- **/
let currentSessionId = "";
let menuItems = [];
let groupedMembers = {};
let memberGroupMap = {};
let sessionUnsubscribe = null;

/** --- 初始化：載入成員資料 --- **/
async function loadMembers() {
  const snapshot = await db.collection("members").get();
  groupedMembers = {};
  memberGroupMap = {};

  snapshot.forEach(doc => {
    if (doc.id === "groups") return;
    const data = doc.data();
    const group = data.group || "其他";

    if (!groupedMembers[group]) groupedMembers[group] = [];
    groupedMembers[group].push({ code: data.code, name: data.name });
    memberGroupMap[data.code] = group;
  });
}

/** --- 監聽當前團購狀態 --- **/
function listenSessionClosed(sessionId) {
  if (sessionUnsubscribe) sessionUnsubscribe();

  sessionUnsubscribe = db.collection("sessions").doc(sessionId).onSnapshot(doc => {
    const data = doc.data();
    if (data && data.closed) {
      Swal.fire({
        icon: 'warning',
        title: '已經關團',
        text: '訂餐已關閉，若要加點請聯絡主揪。',
        confirmButtonText: '回首頁',
        allowOutsideClick: false
      }).then(() => window.location.href = 'index.html');
    }
  });
}

/** --- 載入今日開團資訊 --- **/
async function loadTodaySession() {
  try {
    await loadMembers();
    const snapshot = await db.collection("sessions").orderBy("timeCreated", "desc").limit(1).get();
    const titleEl = document.getElementById("restaurantName");

    if (!snapshot.empty) {
      const doc = snapshot.docs[0];
      currentSessionId = doc.id;
      const data = doc.data();

      listenSessionClosed(currentSessionId);

      titleEl.innerText = `今日餐廳：${data.restaurantName || "（未命名）"}`;

      if (data.imageUrl) {
        document.getElementById("restaurantImageContainer").innerHTML = `<img src="${data.imageUrl}" alt="餐廳圖片"/>`;
      }

      // 載入菜單
      const menuDoc = await db.collection("menus").doc(currentSessionId).get();
      if (menuDoc.exists) {
        menuItems = menuDoc.data().menu || [];
        addOrderInput(); // 自動生成第一行
        document.getElementById("addBtn").disabled = false;
        document.getElementById("submitBtn").disabled = false;
      }
    } else {
      titleEl.innerText = "⚠️ 今天尚未開團";
    }
  } catch (err) {
    console.error(err);
    Swal.fire("錯誤", "載入資料失敗", "error");
  }
}

/** --- 建立成員下拉選單 --- **/
function buildMemberSelect() {
  const select = document.createElement("select");
  select.innerHTML = `<option disabled selected value="">代號</option>`;

  Object.keys(groupedMembers)
    .sort((a, b) => a.localeCompare(b, 'zh-Hant-u-co-stroke'))
    .forEach(group => {
      const optGroup = document.createElement("optgroup");
      optGroup.label = `---- ${group} ----`;

      groupedMembers[group].forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.code;
        opt.textContent = `${m.code} ${m.name}`;
        optGroup.appendChild(opt);
      });
      select.appendChild(optGroup);
    });
  return select;
}

/** --- 新增訂單輸入行 --- **/
function addOrderInput() {
  const container = document.getElementById("orderContainer");
  const block = document.createElement("div");
  block.className = "order-block";

  // 1. 餐點選擇
  const menuSelect = document.createElement("select");
  menuSelect.innerHTML = '<option value="" disabled selected>請選擇餐點</option>';
  menuItems.forEach(item => {
    const opt = document.createElement("option");
    opt.value = opt.textContent = item;
    menuSelect.appendChild(opt);
  });

  // 2. 成員與備註行
  const noteRow = document.createElement("div");
  noteRow.className = "note-row";

  const codeSelect = buildMemberSelect();
  const noteInput = document.createElement("input");
  noteInput.placeholder = "備註 (如：加辣)";

  const delBtn = document.createElement("button");
  delBtn.className = "delete-btn";
  delBtn.textContent = "刪除";
  delBtn.onclick = () => { block.remove(); updateDeleteButtons(); };

  // 自動帶入上一個人的代號 (方便連點)
  const lastBlock = container.lastElementChild;
  if (lastBlock) {
    const lastCode = lastBlock.querySelector("select:nth-child(1)").value; 
    // 注意：這裡根據結構邏輯，如果是 noteRow 裡的 select:
    const prevCode = lastBlock.querySelector(".note-row select").value;
    if (prevCode) codeSelect.value = prevCode;
  }

  noteRow.append(codeSelect, noteInput, delBtn);
  block.append(menuSelect, noteRow);
  container.appendChild(block);
  updateDeleteButtons();
}

/** --- 更新刪除按鈕顯示狀態 --- **/
function updateDeleteButtons() {
  const blocks = document.querySelectorAll(".order-block");
  document.querySelectorAll(".delete-btn").forEach(btn => {
    btn.style.display = (blocks.length > 1) ? "inline-block" : "none";
  });
}

/** --- 送出訂單 --- **/
async function submitOrder() {
  const blocks = document.querySelectorAll(".order-block");
  const submitBtn = document.getElementById("submitBtn");
  const addBtn = document.getElementById("addBtn");

  // 禁用按鈕防止重複送出
  submitBtn.disabled = true;
  addBtn.disabled = true;
  submitBtn.textContent = "送出中...";

  try {
    // 檢查是否已關團
    const sessionDoc = await db.collection("sessions").doc(currentSessionId).get();
    if (sessionDoc.data()?.closed) {
      throw new Error("ALREADY_CLOSED");
    }

    const batch = db.batch();
    
    for (const block of blocks) {
      const item = block.querySelector("select").value;
      const code = block.querySelector(".note-row select").value;
      const note = block.querySelector(".note-row input").value.trim();

      if (!item || !code) {
        throw new Error("MISSING_DATA");
      }

      const ref = db.collection("orders").doc(currentSessionId).collection("items").doc();
      batch.set(ref, {
        item,
        code,
        group: memberGroupMap[code] || "其他",
        note,
        time: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    await batch.commit();

    Swal.fire({
      icon: 'success',
      title: '訂餐成功！',
      text: '要去統計頁確認嗎？',
      showCancelButton: true,
      confirmButtonText: '📊 前往統計',
      cancelButtonText: '🍱 繼續點餐'
    }).then(res => {
      if (res.isConfirmed) window.location.href = 'summary.html';
      else location.reload();
    });

  } catch (err) {
    let msg = "送出失敗，請重試";
    if (err.message === "ALREADY_CLOSED") msg = "本次訂餐已關團！";
    if (err.message === "MISSING_DATA") msg = "請檢查是否漏選餐點或代號";
    
    Swal.fire("提醒", msg, "warning");
    submitBtn.disabled = false;
    addBtn.disabled = false;
    submitBtn.textContent = "送出訂單";
  }
}

window.onload = loadTodaySession;
</script>
</body>
</html>
