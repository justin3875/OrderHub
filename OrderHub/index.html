<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icon.png" />
  <link rel="shortcut icon" href="./icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>內部訂餐系統</title>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333;
    }

    .wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      padding: 20px;
    }
    .card {
      position: relative;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      max-width: 360px;
      width: 100%;
      padding: 30px 20px;
      overflow: hidden;
    }
    .card header {
      text-align: center;
      margin-bottom: 24px;
    }
    .card header h1 {
      font-size: 26px;
      margin-bottom: 8px;
      color: #2c3e50;
    }
    .card header p {
      font-size: 14px;
      color: #7f8c8d;
    }

    .loader-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center; justify-content: center;
      flex-direction: column;
      z-index: 10;
    }
    .loader-spinner {
      width: 40px; height: 40px;
      border: 4px solid #ccc;
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 14px; color: #555; }

    .action-list { display: flex; flex-direction: column; gap: 16px; }
    .btn {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 0; font-size: 18px;
      border: none; border-radius: 8px; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s; color: #fff;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 4px 8px rgba(0,0,0,0.12); }
    .btn:disabled { background: #bdc3c7 !important; cursor: not-allowed; opacity: 0.7; }

    .btn-primary { background: linear-gradient(90deg, #1abc9c, #16a085); }
    .btn-primary:hover:not(:disabled) { background: linear-gradient(90deg, #16a085, #1abc9c); }

    .btn-secondary { background: linear-gradient(90deg, #3498db, #2980b9); }
    .btn-secondary:hover:not(:disabled) { background: linear-gradient(90deg, #2980b9, #3498db); }

    .btn-danger { background: linear-gradient(90deg, #e74c3c, #c0392b); }
    .btn-danger:hover:not(:disabled) { background: linear-gradient(90deg, #c0392b, #e74c3c); }

    .separator {
      text-align: center;
      margin: 16px 0;
      position: relative;
    }
    .separator::before, .separator::after {
      content: "";
      height: 1px;
      background: #ecf0f1;
      position: absolute;
      top: 50%;
      width: 40%;
    }
    .separator::before { left: 0; }
    .separator::after { right: 0; }
    .separator span { font-size: 12px; color: #95a5a6; padding: 0 8px; }

    /* 密碼輸入 Modal */
    #pwdModal {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #pwdModal .modal-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 280px;
      text-align: center;
    }
    #pwdInput {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 12px;
    }
  </style>

<script>
  const currentVersion = "20251210";
  const savedVersion = localStorage.getItem("pageVersion");
  if (savedVersion && savedVersion !== currentVersion) {
    localStorage.setItem("pageVersion", currentVersion);
    location.reload(true);
  } else if (!savedVersion) {
    localStorage.setItem("pageVersion", currentVersion);
  }
</script>
</head>
<body>

  <div class="wrapper">
    <div class="card">

      <div class="loader-overlay" id="loaderOverlay">
        <div class="loader-spinner"></div>
        <div class="loader-text">載入中…</div>
      </div>

      <header>
        <h1>內部訂餐系統</h1>
        <p id="restaurantName">載入中…</p>
      </header>

      <div class="action-list">
        <button id="orderBtn" class="btn btn-primary" disabled>我要訂餐</button>
        <button id="newOrderBtn" class="btn btn-primary" disabled>我要開團</button>
        <button id="summaryBtn" class="btn btn-primary">訂單統計</button>

        <div class="separator"><span>進階功能</span></div>

        <button id="adminBtn" class="btn btn-secondary">管理設定</button>
        <button id="closeBtn" class="btn btn-danger">結束開團</button>
      </div>

      <!-- 密碼輸入 Modal -->
      <div id="pwdModal">
        <div class="modal-box">
          <h3 style="margin-bottom:12px;">結束開團</h3>
          <p style="font-size:14px; margin-bottom:10px;">請輸入管理密碼：</p>
          <input id="pwdInput" type="password">
          <button id="pwdOkBtn" class="btn btn-danger" style="width:100%; margin-bottom:8px;">確認</button>
          <button id="pwdCancelBtn" class="btn btn-secondary" style="width:100%;">取消</button>
        </div>
      </div>

    </div>
  </div>

  <script>
  const orderBtn = document.getElementById("orderBtn");
  const newOrderBtn = document.getElementById("newOrderBtn");
  const summaryBtn = document.getElementById("summaryBtn");
  const adminBtn = document.getElementById("adminBtn");
  const closeBtn = document.getElementById("closeBtn");
  const titleEl = document.getElementById("restaurantName");
  const loaderOverlay = document.getElementById("loaderOverlay");

  const pwdModal = document.getElementById("pwdModal");
  const pwdInput = document.getElementById("pwdInput");
  const pwdOkBtn = document.getElementById("pwdOkBtn");
  const pwdCancelBtn = document.getElementById("pwdCancelBtn");

  const firebaseConfig = {
    apiKey: "//FIREBASE///",
    authDomain: "//FIREBASE///",
    projectId: "//FIREBASE///",
    storageBucket: "//FIREBASE///",
    messagingSenderId: "//FIREBASE///",
    appId: "//FIREBASE///"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  orderBtn.disabled = true;
  newOrderBtn.disabled = true;

  summaryBtn.addEventListener("click", () => location.href = "summary.html");
  adminBtn.addEventListener("click", () => location.href = "admin.html");

  window.onload = loadLatestRestaurant;

  async function loadLatestRestaurant() {
    db.collection("sessions")
    .orderBy("timeCreated", "desc")
    .limit(5)   // 只抓前幾筆即可
    .onSnapshot((snapshot) => {

      let openSession = null;

      snapshot.forEach(doc => {
        if (!doc.data().closed && !openSession) {
          openSession = doc;
        }
      });

      if (openSession) {
        const name = openSession.data().restaurantName || "（未命名）";
        titleEl.textContent = `🍽️ 今日餐廳：${name}`;

        const isDrink = name.includes("飲料");

        orderBtn.onclick = () => {
          location.href = isDrink ? "drink.html" : "order.html";
        };

        orderBtn.disabled = false;
        newOrderBtn.disabled = true;
        closeBtn.disabled = false;

      } else {
        titleEl.textContent = "⚠️ 今天尚未開團";

        orderBtn.disabled = true;

        newOrderBtn.disabled = false;
        newOrderBtn.onclick = () => location.href = "neworder.html";

        closeBtn.disabled = true;
      }

      loaderOverlay.style.display = "none";
    },
    (error) => {
      console.error(error);
      titleEl.textContent = "⚠️ 餐廳載入失敗";
      loaderOverlay.style.display = "none";
    });
  }

  /* ======== Modal 行為 ======== */

  closeBtn.addEventListener("click", () => {
    pwdInput.value = "";
    pwdModal.style.display = "flex";

    setTimeout(() => {
      pwdInput.focus();
    }, 50);
  });

  pwdCancelBtn.addEventListener("click", () => {
    pwdModal.style.display = "none";
  });

  /* ======== 核心驗證函式（統一入口） ======== */

  async function handlePasswordConfirm() {
    const pwd = pwdInput.value.trim();

    if (pwd !== "666") {
      titleEl.textContent = "❌ 密碼錯誤，操作已取消";
      pwdModal.style.display = "none";
      return;
    }

    document.querySelectorAll("button").forEach(btn => btn.disabled = true);

    try {
      const snapshot = await db.collection("sessions")
        .orderBy("timeCreated", "desc")
        .limit(1)
        .get();

      if (!snapshot.empty) {
        const sessionRef = snapshot.docs[0].ref;
        await sessionRef.update({ closed: true });
      }

      window.location.reload();

    } catch (err) {
      console.error(err);
      titleEl.textContent = "❌ 操作失敗";
      pwdModal.style.display = "none";
    }
  }

  /* 點擊確認 */
  pwdOkBtn.addEventListener("click", handlePasswordConfirm);

  /* 按 Enter（桌機 + 手機） */
  pwdInput.addEventListener("keyup", function (e) {
    if (e.key === "Enter" || e.keyCode === 13) {
      handlePasswordConfirm();
    }
  });

</script>

</body>
</html>
