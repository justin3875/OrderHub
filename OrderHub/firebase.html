<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>後台管理系統(beta)</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%;
      font-family:"Helvetica Neue", Arial, sans-serif;
      background:linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color:#333;
    }

    .wrapper {
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:10px;
    }
    .card {
      position:relative;
      background-color:#fff;
      border-radius:12px;
      box-shadow:0 8px 16px rgba(0,0,0,0.1);
      width:100%;
      max-width:900px;
      padding:30px 20px;
    }

    .back-btn {
      position:absolute;
      top:10px; left:10px;
      padding:6px 10px;
      font-size:14px;
      background:linear-gradient(90deg, #3498db, #2980b9);
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
    .back-btn:hover { background:linear-gradient(90deg, #2980b9, #3498db); }

    .clean-btn {
      position:absolute;
      top:10px; right:10px;
      padding:6px 12px;
      font-size:14px;
      background-color:#e74c3c;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
    .clean-btn:hover { background-color:#c0392b; }

    h1 {
      text-align:center;
      margin-bottom:24px;
      font-size:24px;
      color:#2c3e50;
    }

    .section-title {
      text-align:center;
      font-size:20px;
      margin:20px 0 12px 0;
      color:#2c3e50;
    }

    .table-container { overflow-x:auto; margin-bottom:30px; }

    table {
      width:100%;
      border-collapse:collapse;
      background:#fff;
      box-shadow:0 0 5px rgba(0,0,0,0.1);
      min-width:600px;
    }
    th { background:#f0f0f0; }
    th, td {
      padding:6px;
      border:1px solid #ccc;
      vertical-align:middle;
    }

    table th:nth-child(1),
    table td:nth-child(1) { width:15%; text-align:center; }
    table th:nth-child(2),
    table td:nth-child(2) { width:30%; }
    table th:nth-child(3),
    table td:nth-child(3) { width:40%; }
    table th:nth-child(4),
    table td:nth-child(4) { width:15%; text-align:center; }

    textarea {
      width:100%;
      padding:5px;
      font-size:14px;
      border:1px solid #ccc;
      border-radius:4px;
      resize:vertical;
      min-height:40px;
    }

    button.action-btn {
      padding:6px 12px;
      font-size:14px;
      margin:2px;
      border:none;
      border-radius:4px;
      background:#3498db;
      color:#fff;
      cursor:pointer;
    }
    button.action-btn:hover { background:#2980b9; }

    button.action-btn.delete { background:#FF5151; }
    button.action-btn.delete:hover { background:#D64545; }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="card">

      <!-- 返回 -->
      <button class="back-btn" onclick="window.location.href='admin.html'">← 返回</button>

      <!-- 刪除三個月前 -->
      <button class="clean-btn" onclick="deleteOldData()">刪除3M前</button>

      <h1>🔥 Firestore 後台管理系統 (beta)</h1>

      <div class="section-title">近14天的資料</div>

      <div class="table-container">
        <table id="combinedTable"></table>
      </div>

    </div>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "//FIREBASE///",
    authDomain: "//FIREBASE///",
    projectId: "//FIREBASE///",
    storageBucket: "//FIREBASE///",
    messagingSenderId: "//FIREBASE///",
    appId: "//FIREBASE///"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  loadCombined();

  // ====== 主表格（Sessions + Menus）======
  async function loadCombined() {
    const now = Date.now();
    const twoWeeksMS = 14 * 24 * 60 * 60 * 1000;
    const threshold = now - twoWeeksMS;

    const sessionsSnap = await db.collection("sessions")
      .orderBy("timeCreated", "desc")
      .get();

    const menusSnap = await db.collection("menus").get();

    const menusMap = {};
    menusSnap.forEach(doc => menusMap[doc.id] = doc.data());

    let html = `
      <tr>
        <th>Time</th>
        <th>Restaurant</th>
        <th>Menus</th>
        <th>操作</th>
      </tr>
    `;

    sessionsSnap.forEach(doc => {
      const data = doc.data();

      if (!data.timeCreated || !data.timeCreated.seconds) return;
      const timeMS = data.timeCreated.seconds * 1000;
      if (timeMS < threshold) return; // 只顯示近 14 天

      const timeStr = new Date(timeMS).toLocaleString();
      const menusData = menusMap[doc.id];
      const menuText = menusData ? (menusData.menu || []).join(", ") : "";

      html += `
        <tr>
          <td>${timeStr}</td>

          <td>
            <textarea class="restaurantInput" data-id="${doc.id}">${data.restaurantName || ""}</textarea>
          </td>

          <td>
            <textarea class="menuInput" data-id="${doc.id}">${menuText}</textarea>
          </td>

          <td>
            <button class="action-btn" onclick="saveAll('${doc.id}', this)">存</button>
            <button class="action-btn delete" onclick="deleteAll('${doc.id}', this)">刪</button>
          </td>
        </tr>
      `;
    });

    document.getElementById("combinedTable").innerHTML = html;
  }

  // ====== 同時存：Sessions + Menus ======
  async function saveAll(id, btn) {
    btn.disabled = true;
    Swal.fire({ title:"儲存中...", allowOutsideClick:false, didOpen:()=>Swal.showLoading() });

    const restaurant = document.querySelector(`textarea.restaurantInput[data-id="${id}"]`).value.trim();
    const menuRaw = document.querySelector(`textarea.menuInput[data-id="${id}"]`).value.trim();

    const menuArray = menuRaw.split(",").map(s => s.trim()).filter(s => s);

    await db.collection("sessions").doc(id).update({
      restaurantName: restaurant
    });

    await db.collection("menus").doc(id).set({
      restaurantName: restaurant,
      menu: menuArray
    }, { merge:true });

    Swal.close();
    Swal.fire("已存檔", "", "success");
    btn.disabled = false;
  }

  // ====== 刪除：Sessions + Menus + Orders ======
  async function deleteAll(id, btn) {
    if (!confirm(`確定刪除 Session ${id}（含 Menus + Orders）？`)) return;

    btn.disabled = true;
    Swal.fire({ title:"刪除中...", allowOutsideClick:false, didOpen:()=>Swal.showLoading() });

    await db.collection("sessions").doc(id).delete();
    await db.collection("menus").doc(id).delete();

    const items = await db.collection("orders").doc(id).collection("items").get();
    const batch = db.batch();
    items.forEach(doc => batch.delete(doc.ref));
    await batch.commit();

    await db.collection("orders").doc(id).delete();

    Swal.close();
    Swal.fire("刪除完成", "", "success");
    loadCombined();
  }

  // ====== 刪除三個月前所有資料 ======
  async function deleteOldData() {
  if (!confirm("確定要刪除三個月前的所有資料？此動作不可還原！")) return;

  const now = Date.now();
  const threeMS = 90 * 24 * 60 * 60 * 1000;
  const threshold = now - threeMS;

  Swal.fire({
    title: "計算中...",
    html: "正在統計需要刪除的資料...",
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });

  const sessionsSnap = await db.collection("sessions").get();

  // ====== 先統計要刪多少 ======
  const deleteTargets = [];

  for (const doc of sessionsSnap.docs) {
    const data = doc.data();
    if (!data.timeCreated?.seconds) continue;

    const timeMS = data.timeCreated.seconds * 1000;
    if (timeMS < threshold) {
      deleteTargets.push(doc.id);
    }
  }

  const total = deleteTargets.length;

  if (total === 0) {
    Swal.fire("沒有需要刪除的資料", "", "info");
    return;
  }

  // ====== 開始刪除 ======
  let batch = db.batch();
  let operationCount = 0;
  let deletedCount = 0;

  async function commitBatch() {
    if (operationCount === 0) return;
    await batch.commit();
    batch = db.batch();
    operationCount = 0;
  }

  Swal.fire({
    title: "刪除中...",
    html: `
      <div id="progressText">0 / ${total}</div>
      <div style="margin-top:10px;">
        <b id="percentText">0%</b>
      </div>
    `,
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });

  for (const id of deleteTargets) {

    // 刪 sessions
    batch.delete(db.collection("sessions").doc(id));
    operationCount++;

    // 刪 menus
    batch.delete(db.collection("menus").doc(id));
    operationCount++;

    // 刪 orders items
    const itemsSnap = await db.collection("orders").doc(id).collection("items").get();
    itemsSnap.forEach(itemDoc => {
      batch.delete(itemDoc.ref);
      operationCount++;
    });

    // 刪 orders 主文件
    batch.delete(db.collection("orders").doc(id));
    operationCount++;

    deletedCount++;

    // ====== 更新進度 ======
    const percent = Math.floor((deletedCount / total) * 100);

    document.getElementById("progressText").innerText =
      `${deletedCount} / ${total}`;

    document.getElementById("percentText").innerText =
      `${percent}%`;

    // 避免爆 500
    if (operationCount >= 450) {
      await commitBatch();
    }
  }

  await commitBatch();

  Swal.close();
  Swal.fire(`刪除完成！共刪除 ${deletedCount} 筆`, "", "success");

  loadCombined();
}
</script>

</body>
</html>
