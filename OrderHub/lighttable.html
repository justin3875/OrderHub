<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>LightTable 編輯器</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:linear-gradient(135deg,#f5f7fa,#c3cfe2)}
.wrapper{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.card{position:relative;background:#fff;border-radius:12px;padding:28px;width:420px;box-shadow:0 10px 20px rgba(0,0,0,.1)}
.back{position:absolute;left:10px;top:10px;background:#2980b9;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
.member-btn{position:absolute;right:10px;top:10px;background:#16a085;color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer}
h1{text-align:center;margin-bottom:16px}
.controls{display:flex;gap:10px;margin-bottom:12px}
.controls input{flex:1;padding:8px;border:1px solid #ccc;border-radius:6px}
.btn{padding:9px 14px;border:none;border-radius:6px;background:#3498db;color:#fff;cursor:pointer}

table{width:100%;border-collapse:collapse}
td{width:60px;height:60px;border:1px solid #ccc;text-align:center;cursor:pointer;font-size:13px}
td:hover{background:#eef}

#loading{position:fixed;inset:0;background:#fff8;display:flex;align-items:center;justify-content:center;font-size:18px}

.swal2-container{align-items:flex-start;padding-top:80px}
.member-picker{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.member-search{height:36px;font-size:14px}
.member-list-wrap{border:1px solid #ddd;border-radius:6px;overflow:hidden}
.member-list{width:100%;border:none;height:190px;font-size:14px;padding:4px}
.member-list option{padding:6px}
.member-list option:hover{background:#eef}
</style>
</head>

<body>
<div id="loading">Loading...</div>

<div class="wrapper">
<div class="card">
<button class="back" onclick="location.href='admin.html'">← 返回</button>
<button class="member-btn" onclick="location.href='member.html'">👥 成員</button>
<h1>LightTable</h1>

<div class="controls">
<input id="rows" type="number" placeholder="行" min="1" max="20">
<input id="cols" type="number" placeholder="列" min="1" max="20">
<button class="btn" onclick="generateGrid()">產生</button>
</div>

<table id="seatTable"></table>

</div>
</div>

<script>

firebase.initializeApp({
 apiKey:"\\firebase\\",
 authDomain:"\\firebase\\",
 projectId:"\\firebase\\"
});

const db=firebase.firestore();
const seatTable=document.getElementById("seatTable");
const loading=document.getElementById("loading");

let members=[];
let memberOptionsHTML="";

/* ---------- GRID ---------- */

async function generateGrid(){

 const r=parseInt(rows.value);
 const c=parseInt(cols.value);
 if(!r||!c) return;

 await db.collection("staffList").doc("tableSize").set({rows:r,cols:c});

 const frag=document.createDocumentFragment();

 for(let i=0;i<r;i++){
  const tr=document.createElement("tr");

  for(let j=0;j<c;j++){
   const td=document.createElement("td");
   td.dataset.row=i;
   td.dataset.col=j;
   td.onclick=()=>editSeat(td);
   tr.appendChild(td);
  }

  frag.appendChild(tr);
 }

 seatTable.innerHTML="";
 seatTable.appendChild(frag);

}

/* ---------- EDIT SEAT ---------- */

function editSeat(cell){

 Swal.fire({
  title:"選擇人員",
  position:"top",
  width:360,
  html:`
  <div class="member-picker">
   <input id="memberSearch" class="swal2-input member-search" placeholder="🔍 搜尋姓名或代號">
   <div class="member-list-wrap">
    <select id="memberList" class="member-list" size="8">
    ${memberOptionsHTML}
    </select>
   </div>
  </div>
  `,
  showCancelButton:true,
  showDenyButton:true,
  denyButtonText:"清空",
  confirmButtonText:"確定",

  didOpen:()=>{

   const search=document.getElementById("memberSearch");
   const select=document.getElementById("memberList");

   if(cell.dataset.code) select.value=cell.dataset.code;

   search.addEventListener("input",()=>{
    const q=search.value.toLowerCase();
    [...select.options].forEach(o=>{
     const t=o.text.toLowerCase();
     o.style.display=t.includes(q)?"":"none";
    });
   });

  }

 }).then(res=>{

  if(res.isDenied){
   cell.innerHTML="";
   delete cell.dataset.code;
   delete cell.dataset.name;
   delete cell.dataset.extension;
   saveSeats();
   return;
  }

  if(!res.isConfirmed) return;

  const code=document.getElementById("memberList").value;
  const m=members.find(x=>x.code===code);
  if(!m) return;

  cell.dataset.code=m.code;
  cell.dataset.name=m.name;
  cell.dataset.extension=m.ext||"";

  cell.innerHTML=`${m.name}<br><span style="font-size:11px;color:#777">${m.ext||""}</span>`;

  saveSeats();

 });

}

/* ---------- SAVE ---------- */

async function saveSeats(){

 const batch=db.batch();

 seatTable.querySelectorAll("td").forEach(td=>{

  if(!td.dataset.code) return;

  const data={
   code:td.dataset.code,
   name:td.dataset.name,
   extension:td.dataset.extension,
   seatRow:+td.dataset.row,
   seatCol:+td.dataset.col
  };

  batch.set(db.collection("staffList").doc(data.code),data);

 });

 await batch.commit();

}

/* ---------- INIT (FAST LOAD) ---------- */

window.onload=async()=>{

 const [memberSnap,staffSnap]=await Promise.all([
  db.collection("members").get(),
  db.collection("staffList").get()
 ]);

 members=memberSnap.docs
  .map(d=>d.data())
  .sort((a,b)=>a.code.localeCompare(b.code));

 memberOptionsHTML=members
  .map(m=>`<option value="${m.code}">${m.code} ${m.name}</option>`)
  .join("");

 const tableSize=staffSnap.docs.find(d=>d.id==="tableSize");

 rows.value=tableSize?tableSize.data().rows:7;
 cols.value=tableSize?tableSize.data().cols:6;

 await generateGrid();

 staffSnap.forEach(doc=>{

  if(doc.id==="tableSize") return;

  const d=doc.data();
  const cell=seatTable.rows[d.seatRow]?.cells[d.seatCol];
  if(!cell) return;

  cell.dataset.code=d.code;
  cell.dataset.name=d.name;
  cell.dataset.extension=d.extension;

  cell.innerHTML=`${d.name}<br><span style="font-size:11px;color:#777">${d.extension}</span>`;

 });

 loading.style.display="none";

}

</script>

</body>
</html>
